<!DOCTYPE html>
<html>
    <body>
        <form id="login-form" method="POST">
            <input
                type="text"
                name="username"
                placeholder="Your username"
            />
            <input
                type="password"
                name="password"
                placeholder="Your password"
            />
            <input
                type="submit"
                value="Login"
            />
        </form>
        
        <form id="search-form" method="GET">
            <input
                type="text"
                name="q"
                placeholder="Your search"
            />
            <input
                type="submit"
                value="Search"
            />
        </form>
    </body>

    <div id="id-content-container"></div>

    <script src="./client.js"></script>
</html>
